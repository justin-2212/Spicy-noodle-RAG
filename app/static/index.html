<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spicy Noodle AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-fire-alt"></i>
                <span>SpicyNoodle AI</span>
            </div>
            <div class="new-chat">
                <button id="new-chat-btn"><i class="fas fa-plus"></i> Cuộc trò chuyện mới</button>
            </div>
            <div class="chat-history">
                <p class="section-title">Gần đây</p>
                <ul id="history-list">
                    <!-- Dynamic chat history will be rendered here -->
                </ul>
            </div>
            <div class="user-profile">
                <div class="avatar">AD</div>
                <div class="info">
                    <span class="name">Admin User</span>
                    <span class="status">Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-title">
                    <h2>Trợ lý thông minh</h2>
                    <p>Luôn sẵn sàng hỗ trợ bạn chọn món</p>
                </div>
                <div class="header-actions">
                    <button class="icon-btn"><i class="fas fa-search"></i></button>
                    <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messages-container">
                <!-- Welcome Message -->
                <div class="message assistant">
                    <div class="message-content">
                        Xin chào! Mình là trợ lý AI của quán Mỳ Cay. Bạn cần mình tư vấn chọn món hay có câu hỏi gì về thực đơn không ạ? 🔥
                    </div>
                </div>
            </div>

            <footer class="chat-footer">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Nhập câu hỏi của bạn ở đây..." autocomplete="off">
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <p class="disclaimer">AI có thể đưa ra thông tin không chính xác. Hãy kiểm tra lại với nhân viên.</p>
            </footer>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
